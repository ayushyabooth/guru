version: '3.8'

# Local development only. For production, use managed PostgreSQL (e.g., Neon).
services:
  postgres:
    image: postgres:15
    environment:
      # DEV ONLY — change these for any non-local deployment
      POSTGRES_DB: guru_db
      POSTGRES_USER: guru_user
      POSTGRES_PASSWORD: guru_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guru_user -d guru_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  fastapi:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # DEV ONLY — use environment variables or secrets manager in production
      - DATABASE_URL=postgresql://guru_user:guru_password@postgres:5432/guru_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=development-secret-key-change-in-production
      - APP_ENV=development
      - DEBUG=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
