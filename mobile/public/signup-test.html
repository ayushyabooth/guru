<!DOCTYPE html>
<html>
<head>
    <title>Guru Signup Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin: 10px 0; }
        input { padding: 10px; width: 300px; }
        button { padding: 10px 20px; background: #007AFF; color: white; border: none; cursor: pointer; }
        .result { margin: 20px 0; padding: 10px; background: #f0f0f0; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>Guru Signup Diagnostic Test</h1>
    
    <div class="form-group">
        <input type="email" id="email" placeholder="Email" value="test.browser@example.com">
    </div>
    
    <div class="form-group">
        <input type="password" id="password" placeholder="Password" value="testpass123">
    </div>
    
    <div class="form-group">
        <button onclick="testSignup()">Test Signup</button>
        <button onclick="testCORS()">Test CORS</button>
        <button onclick="clearResults()">Clear</button>
    </div>
    
    <div id="results"></div>

    <script>
        const API_URL = 'http://localhost:8000';
        
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            results.appendChild(div);
            console.log(message);
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
        
        async function testCORS() {
            log('Testing CORS preflight...', 'info');
            
            try {
                const response = await fetch(`${API_URL}/auth/signup`, {
                    method: 'OPTIONS',
                    headers: {
                        'Origin': 'http://localhost:19006',
                        'Access-Control-Request-Method': 'POST',
                        'Access-Control-Request-Headers': 'Content-Type'
                    }
                });
                
                log(`CORS preflight status: ${response.status}`, response.status === 200 ? 'success' : 'error');
                
                const headers = {};
                for (let [key, value] of response.headers.entries()) {
                    headers[key] = value;
                }
                log(`CORS headers: ${JSON.stringify(headers, null, 2)}`, 'info');
                
            } catch (error) {
                log(`CORS test failed: ${error.message}`, 'error');
            }
        }
        
        async function testSignup() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            log(`Testing signup with email: ${email}`, 'info');
            
            try {
                log('Sending signup request...', 'info');
                
                const response = await fetch(`${API_URL}/auth/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Origin': 'http://localhost:19006'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                log(`Response status: ${response.status}`, response.ok ? 'success' : 'error');
                
                const responseHeaders = {};
                for (let [key, value] of response.headers.entries()) {
                    responseHeaders[key] = value;
                }
                log(`Response headers: ${JSON.stringify(responseHeaders, null, 2)}`, 'info');
                
                const data = await response.json();
                
                if (response.ok) {
                    log(`✅ Signup successful!`, 'success');
                    log(`User ID: ${data.user_id}`, 'success');
                    log(`Access token: ${data.access_token.substring(0, 50)}...`, 'success');
                    log(`Refresh token: ${data.refresh_token.substring(0, 50)}...`, 'success');
                } else {
                    log(`❌ Signup failed: ${data.detail || 'Unknown error'}`, 'error');
                }
                
            } catch (error) {
                log(`❌ Network error: ${error.message}`, 'error');
                log(`Error details: ${error.stack}`, 'error');
            }
        }
        
        // Test on page load
        window.onload = function() {
            log('Page loaded. Ready to test signup functionality.', 'info');
            log(`Testing against API: ${API_URL}`, 'info');
        };
    </script>
</body>
</html>
