<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for each ring -->
    <linearGradient id="catchUpGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#32B8C6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2DA6B2;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="diveInGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E68161;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F5F5;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="recapGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6B861;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A857;stop-opacity:1" />
    </linearGradient>

    <!-- Pattern for concentric lines effect -->
    <pattern id="concentricLines" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="transparent"/>
      <line x1="0" y1="0" x2="8" y2="8" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
    </pattern>

    <!-- Masks for each ring to create depth -->
    <mask id="catchUpMask">
      <circle cx="200" cy="120" r="80" fill="white"/>
      <circle cx="200" cy="120" r="65" fill="black"/>
    </mask>

    <mask id="diveInMask">
      <circle cx="130" cy="260" r="80" fill="white"/>
      <circle cx="130" cy="260" r="65" fill="black"/>
    </mask>

    <mask id="recapMask">
      <circle cx="270" cy="260" r="80" fill="white"/>
      <circle cx="270" cy="260" r="65" fill="black"/>
    </mask>
  </defs>

  <!-- Group 1: Catch Up (Top) - Teal with yin-yang tips -->
  <g id="catch-up-ring" opacity="0.95">
    <!-- Main ring path with multiple concentric strokes -->
    <path d="M 200 40 
             C 160 40, 130 60, 130 90
             C 130 130, 160 160, 200 160
             C 240 160, 270 130, 270 90
             C 270 60, 240 40, 200 40
             M 200 50
             C 165 50, 140 68, 140 90
             C 140 125, 168 150, 200 150
             C 232 150, 260 125, 260 90
             C 260 68, 235 50, 200 50"
          fill="none" 
          stroke="url(#catchUpGradient)" 
          stroke-width="20"
          opacity="0.9"/>

    <!-- Concentric stroke lines (7 layers) -->
    <path d="M 200 40 C 160 40, 130 60, 130 90 C 130 130, 160 160, 200 160 C 240 160, 270 130, 270 90 C 270 60, 240 40, 200 40"
          fill="none" stroke="url(#catchUpGradient)" stroke-width="18" opacity="0.8"/>
    <path d="M 200 43 C 162 43, 133 62, 133 90 C 133 128, 162 157, 200 157 C 238 157, 267 128, 267 90 C 267 62, 238 43, 200 43"
          fill="none" stroke="url(#catchUpGradient)" stroke-width="16" opacity="0.7"/>
    <path d="M 200 46 C 164 46, 136 64, 136 90 C 136 126, 164 154, 200 154 C 236 154, 264 126, 264 90 C 264 64, 236 46, 200 46"
          fill="none" stroke="url(#catchUpGradient)" stroke-width="14" opacity="0.6"/>
    <path d="M 200 49 C 166 49, 139 66, 139 90 C 139 124, 166 151, 200 151 C 234 151, 261 124, 261 90 C 261 66, 234 49, 200 49"
          fill="none" stroke="url(#catchUpGradient)" stroke-width="12" opacity="0.5"/>
    <path d="M 200 52 C 168 52, 142 68, 142 90 C 142 122, 168 148, 200 148 C 232 148, 258 122, 258 90 C 258 68, 232 52, 200 52"
          fill="none" stroke="url(#catchUpGradient)" stroke-width="10" opacity="0.4"/>
    <path d="M 200 55 C 170 55, 145 70, 145 90 C 145 120, 170 145, 200 145 C 230 145, 255 120, 255 90 C 255 70, 230 55, 200 55"
          fill="none" stroke="url(#catchUpGradient)" stroke-width="8" opacity="0.3"/>
    <path d="M 200 58 C 172 58, 148 72, 148 90 C 148 118, 172 142, 200 142 C 228 142, 252 118, 252 90 C 252 72, 228 58, 200 58"
          fill="none" stroke="url(#catchUpGradient)" stroke-width="6" opacity="0.2"/>

    <!-- Yin-yang tip at left end -->
    <circle cx="130" cy="90" r="20" fill="url(#catchUpGradient)" opacity="0.95"/>
    <circle cx="130" cy="90" r="10" fill="#1f2121"/>
    <circle cx="130" cy="90" r="3" fill="#FCFCF9"/>

    <!-- Yin-yang tip at right end -->
    <circle cx="270" cy="90" r="20" fill="#1f2121" opacity="0.9"/>
    <circle cx="270" cy="90" r="10" fill="url(#catchUpGradient)"/>
    <circle cx="270" cy="90" r="3" fill="#1f2121"/>
  </g>

  <!-- Group 2: Dive In (Bottom-left) - Orange/White gradient with yin-yang tips -->
  <g id="dive-in-ring" opacity="0.95">
    <!-- Main ring path with multiple concentric strokes -->
    <path d="M 60 260
             C 60 220, 80 190, 110 190
             C 150 190, 180 220, 180 260
             C 180 300, 150 330, 110 330
             C 80 330, 60 300, 60 260
             M 70 260
             C 70 225, 88 200, 110 200
             C 145 200, 170 225, 170 260
             C 170 295, 145 320, 110 320
             C 88 320, 70 295, 70 260"
          fill="none" 
          stroke="url(#diveInGradient)" 
          stroke-width="20"
          opacity="0.9"/>

    <!-- Concentric stroke lines (7 layers) -->
    <path d="M 60 260 C 60 220, 80 190, 110 190 C 150 190, 180 220, 180 260 C 180 300, 150 330, 110 330 C 80 330, 60 300, 60 260"
          fill="none" stroke="url(#diveInGradient)" stroke-width="18" opacity="0.8"/>
    <path d="M 63 260 C 63 222, 82 193, 110 193 C 148 193, 177 222, 177 260 C 177 298, 148 327, 110 327 C 82 327, 63 298, 63 260"
          fill="none" stroke="url(#diveInGradient)" stroke-width="16" opacity="0.7"/>
    <path d="M 66 260 C 66 224, 84 196, 110 196 C 146 196, 174 224, 174 260 C 174 296, 146 324, 110 324 C 84 324, 66 296, 66 260"
          fill="none" stroke="url(#diveInGradient)" stroke-width="14" opacity="0.6"/>
    <path d="M 69 260 C 69 226, 86 199, 110 199 C 144 199, 171 226, 171 260 C 171 294, 144 321, 110 321 C 86 321, 69 294, 69 260"
          fill="none" stroke="url(#diveInGradient)" stroke-width="12" opacity="0.5"/>
    <path d="M 72 260 C 72 228, 88 202, 110 202 C 142 202, 168 228, 168 260 C 168 292, 142 318, 110 318 C 88 318, 72 292, 72 260"
          fill="none" stroke="url(#diveInGradient)" stroke-width="10" opacity="0.4"/>
    <path d="M 75 260 C 75 230, 90 205, 110 205 C 140 205, 165 230, 165 260 C 165 290, 140 315, 110 315 C 90 315, 75 290, 75 260"
          fill="none" stroke="url(#diveInGradient)" stroke-width="8" opacity="0.3"/>
    <path d="M 78 260 C 78 232, 92 208, 110 208 C 138 208, 162 232, 162 260 C 162 288, 138 312, 110 312 C 92 312, 78 288, 78 260"
          fill="none" stroke="url(#diveInGradient)" stroke-width="6" opacity="0.2"/>

    <!-- Yin-yang tip at top -->
    <circle cx="110" cy="190" r="20" fill="url(#diveInGradient)" opacity="0.95"/>
    <circle cx="110" cy="190" r="10" fill="#1f2121"/>
    <circle cx="110" cy="190" r="3" fill="#FCFCF9"/>

    <!-- Yin-yang tip at bottom -->
    <circle cx="110" cy="330" r="20" fill="#1f2121" opacity="0.9"/>
    <circle cx="110" cy="330" r="10" fill="url(#diveInGradient)"/>
    <circle cx="110" cy="330" r="3" fill="#1f2121"/>
  </g>

  <!-- Group 3: Recap (Bottom-right) - Gold with yin-yang tips -->
  <g id="recap-ring" opacity="0.95">
    <!-- Main ring path with multiple concentric strokes -->
    <path d="M 220 260
             C 220 220, 240 190, 270 190
             C 310 190, 340 220, 340 260
             C 340 300, 310 330, 270 330
             C 240 330, 220 300, 220 260
             M 230 260
             C 230 225, 248 200, 270 200
             C 305 200, 330 225, 330 260
             C 330 295, 305 320, 270 320
             C 248 320, 230 295, 230 260"
          fill="none" 
          stroke="url(#recapGradient)" 
          stroke-width="20"
          opacity="0.9"/>

    <!-- Concentric stroke lines (7 layers) -->
    <path d="M 220 260 C 220 220, 240 190, 270 190 C 310 190, 340 220, 340 260 C 340 300, 310 330, 270 330 C 240 330, 220 300, 220 260"
          fill="none" stroke="url(#recapGradient)" stroke-width="18" opacity="0.8"/>
    <path d="M 223 260 C 223 222, 242 193, 270 193 C 308 193, 337 222, 337 260 C 337 298, 308 327, 270 327 C 242 327, 223 298, 223 260"
          fill="none" stroke="url(#recapGradient)" stroke-width="16" opacity="0.7"/>
    <path d="M 226 260 C 226 224, 244 196, 270 196 C 306 196, 334 224, 334 260 C 334 296, 306 324, 270 324 C 244 324, 226 296, 226 260"
          fill="none" stroke="url(#recapGradient)" stroke-width="14" opacity="0.6"/>
    <path d="M 229 260 C 229 226, 246 199, 270 199 C 304 199, 331 226, 331 260 C 331 294, 304 321, 270 321 C 246 321, 229 294, 229 260"
          fill="none" stroke="url(#recapGradient)" stroke-width="12" opacity="0.5"/>
    <path d="M 232 260 C 232 228, 248 202, 270 202 C 302 202, 328 228, 328 260 C 328 292, 302 318, 270 318 C 248 318, 232 292, 232 260"
          fill="none" stroke="url(#recapGradient)" stroke-width="10" opacity="0.4"/>
    <path d="M 235 260 C 235 230, 250 205, 270 205 C 300 205, 325 230, 325 260 C 325 290, 300 315, 270 315 C 250 315, 235 290, 235 260"
          fill="none" stroke="url(#recapGradient)" stroke-width="8" opacity="0.3"/>
    <path d="M 238 260 C 238 232, 252 208, 270 208 C 298 208, 322 232, 322 260 C 322 288, 298 312, 270 312 C 252 312, 238 288, 238 260"
          fill="none" stroke="url(#recapGradient)" stroke-width="6" opacity="0.2"/>

    <!-- Yin-yang tip at top -->
    <circle cx="270" cy="190" r="20" fill="url(#recapGradient)" opacity="0.95"/>
    <circle cx="270" cy="190" r="10" fill="#1f2121"/>
    <circle cx="270" cy="190" r="3" fill="#FCFCF9"/>

    <!-- Yin-yang tip at bottom -->
    <circle cx="270" cy="330" r="20" fill="#1f2121" opacity="0.9"/>
    <circle cx="270" cy="330" r="10" fill="url(#recapGradient)"/>
    <circle cx="270" cy="330" r="3" fill="#1f2121"/>
  </g>

  <!-- Center connection point -->
  <circle cx="200" cy="200" r="15" fill="#1f2121" opacity="0.8"/>
  <circle cx="200" cy="200" r="8" fill="#32B8C6" opacity="0.6"/>
</svg>