<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #1E293B;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #6366F1;
    }
    .status {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .status.connected {
      background: #ECFDF5;
      color: #059669;
    }
    .status.disconnected {
      background: #FEF2F2;
      color: #DC2626;
    }
    .login-form { display: flex; flex-direction: column; gap: 10px; }
    .login-form input {
      padding: 10px 12px;
      border: 1px solid #E2E8F0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .login-form input:focus { border-color: #6366F1; }
    .login-form button {
      padding: 10px;
      background: #6366F1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .login-form button:hover { background: #4F46E5; }
    .login-form button:disabled { opacity: 0.5; }
    .error { color: #DC2626; font-size: 12px; }
    .settings {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #E2E8F0;
    }
    .settings label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #64748B;
    }
    .logout-btn {
      margin-top: 12px;
      padding: 8px;
      width: 100%;
      background: none;
      border: 1px solid #E2E8F0;
      border-radius: 8px;
      color: #64748B;
      font-size: 13px;
      cursor: pointer;
    }
    .logout-btn:hover { background: #F8FAFC; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Guru Reader</h1>
  </div>
  <div id="status" class="status disconnected">Checking connection...</div>
  <div id="login-section" style="display:none">
    <form class="login-form" id="login-form">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <div id="login-error" class="error" style="display:none"></div>
      <button type="submit" id="login-btn">Sign In</button>
    </form>
  </div>
  <div id="connected-section" style="display:none">
    <button class="logout-btn" id="logout-btn">Sign Out</button>
  </div>
  <script src="../dist/popup.js"></script>
</body>
</html>
